services:
  - type: redis
    name: medverify-redis
    plan: free
    ipAllowList: []

  - type: web
    name: medverify-backend
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: medverify-redis
          property: connectionString
      - key: ADMIN_ALLOWED_EMAILS
        sync: false
      - key: ADMIN_BOOTSTRAP_USERS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WEBHOOK_PUBLIC_URL
        sync: false
      - key: TWILIO_VALIDATE_WEBHOOK_SIGNATURE
        value: "true"
